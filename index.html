// ================================================================
// 状态管理
// ================================================================
let currentProvince = null;
let currentCity = null;
let currentCategory = null;
let mapChart = null;
let selectedProvinceOnMap = null;

// ================================================================
// 渲染左侧导航
// ================================================================
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  const orderedProvinces = ['湖北省', '河南省', '陕西省', '新疆维吾尔自治区', '浙江省', '江苏省'];

  for (const pname of orderedProvinces) {
    const pdata = PROVINCE_DATA[pname];
    if (!pdata) continue;
    const hasData = pdata.hasData;
    html += `<div class="province-node">`;
    html += `<div class="province-header${hasData ? ' has-data' : ''}" data-province="${pname}" onclick="selectProvince('${pname}')">`;
    html += `<span class="province-dot"></span>`;
    html += `<span class="province-name">${pname}</span>`;
    if (hasData) html += `<span class="province-badge">${Object.keys(pdata.cities).length}市</span>`;
    html += `<span class="province-arrow">▶</span>`;
    html += `</div>`;

    // 城市列表
    if (hasData && pdata.cities) {
      html += `<div class="city-list" data-province-list="${pname}">`;
      for (const [cname, categories] of Object.entries(pdata.cities)) {
        html += `<div class="city-node" data-province="${pname}" data-city="${cname}" onclick="event.stopPropagation(); selectCity('${pname}', '${cname}')">`;
        html += `<span class="city-icon">📍</span>${cname}`;
        html += `</div>`;
        // 分类标签
        const tags = Object.entries(categories).filter(([k,v]) => v.length > 0);
        if (tags.length > 0) {
          html += `<div class="category-tags" data-city-tags="${pname}|${cname}">`;
          const catNames = { jade: '玉器', turquoise: '绿松石', crystal: '水晶', agate: '玛瑙', gemstone: '宝石' };
          for (const [cat, items] of tags) {
            const catClass = cat === 'jade' ? 'jade' : cat === 'turquoise' ? 'turquoise' : cat === 'crystal' ? 'crystal' : cat === 'agate' ? 'agate' : 'jade';
            html += `<span class="category-tag ${catClass}" onclick="event.stopPropagation(); selectCategory('${pname}', '${cname}', '${cat}')">${catNames[cat] || cat} (${items.length})</span>`;
          }
          html += `</div>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  nav.innerHTML = html;
}

// ================================================================
// 交互逻辑
// ================================================================
function selectProvince(pname) {
  currentProvince = pname;
  currentCity = null;
  currentCategory = null;

  // 更新侧边栏样式
  document.querySelectorAll('.province-header').forEach(h => {
    h.classList.toggle('active', h.dataset.province === pname);
    h.classList.toggle('open', h.dataset.province === pname && PROVINCE_DATA[pname]?.hasData);
  });
  document.querySelectorAll('.city-list').forEach(l => {
    l.classList.toggle('open', l.dataset.provinceList === pname && PROVINCE_DATA[pname]?.hasData);
  });
  document.querySelectorAll('.city-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('selected'));
  document.querySelectorAll('.category-tags').forEach(t => t.style.display = 'none');

  // 更新地图高亮
  highlightMapProvince(pname);

  // 如果是占位省份，显示占位信息
  if (!PROVINCE_DATA[pname]?.hasData) {
    showDetailEmpty(`<strong>${pname}</strong><br>${PROVINCE_DATA[pname]?.placeholder || '数据整理中，敬请期待。'}`);
  } else {
    showDetailEmpty(`<strong>${pname}</strong> — ${Object.keys(PROVINCE_DATA[pname].cities).length} 个城市有玉石文化遗存<br>请点击左侧城市名称浏览详情`);
  }
}

function selectCity(pname, cname) {
  currentProvince = pname;
  currentCity = cname;
  currentCategory = null;

  // 打开省份
  document.querySelectorAll('.province-header').forEach(h => {
    h.classList.toggle('active', h.dataset.province === pname);
    h.classList.toggle('open', h.dataset.province === pname);
  });
  document.querySelectorAll('.city-list').forEach(l => {
    l.classList.toggle('open', l.dataset.provinceList === pname);
  });

  // 高亮城市
  document.querySelectorAll('.city-node').forEach(n => {
    n.classList.toggle('active', n.dataset.province === pname && n.dataset.city === cname);
  });

  // 显示分类标签
  document.querySelectorAll('.category-tags').forEach(t => {
    const shouldShow = t.dataset.cityTags === `${pname}|${cname}`;
    t.style.display = shouldShow ? 'flex' : 'none';
  });
  document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('selected'));

  // 更新地图
  highlightMapProvince(pname);

  // 显示该城市的概览
  const cityData = PROVINCE_DATA[pname]?.cities?.[cname];
  if (cityData) {
    const totalItems = Object.values(cityData).flat().length;
    const catNames = { jade: '玉器', turquoise: '绿松石', crystal: '水晶', agate: '玛瑙', gemstone: '宝石' };
    const cats = Object.entries(cityData).filter(([k,v]) => v.length > 0)
      .map(([k,v]) => `${catNames[k]||k}(${v.length}条)`).join(' · ');
    showDetailEmpty(`<strong>${pname} · ${cname}</strong><br>共 ${totalItems} 条记录：${cats}<br>请点击上方分类标签查看详细内容`);
  }
}

function selectCategory(pname, cname, cat) {
  currentProvince = pname;
  currentCity = cname;
  currentCategory = cat;

  // 更新分类标签样式
  document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('selected'));
  const tagEl = document.querySelector(`.category-tags[data-city-tags="${pname}|${cname}"] .category-tag.${cat}`);
  if (tagEl) tagEl.classList.add('selected');

  // 显示内容
  const items = PROVINCE_DATA[pname]?.cities?.[cname]?.[cat];
  if (items && items.length > 0) {
    renderDetailList(pname, cname, cat, items);
  }
}

function highlightMapProvince(pname) {
  if (!mapChart) return;
  mapChart.dispatchAction({ type: 'downplay', seriesIndex: 0 });
  mapChart.dispatchAction({ type: 'highlight', seriesIndex: 0, name: pname });
}

// ================================================================
// 详情面板
// ================================================================
function renderDetailList(pname, cname, cat, items) {
  const catNames = { jade: '玉器', turquoise: '绿松石', crystal: '水晶', agate: '玛瑙', gemstone: '宝石' };
  const catName = catNames[cat] || cat;
  const catClass = cat === 'jade' ? 'jade' : cat === 'turquoise' ? 'turquoise' : cat === 'crystal' ? 'crystal' : cat === 'agate' ? 'agate' : 'jade';

  let html = '';
  for (const item of items) {
    html += `
    <div style="margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);">
      <div class="detail-header">
        <span class="detail-title">${item.title}</span>
        <span class="detail-badge">${catName}</span>
      </div>
      <div class="detail-meta">
        <span class="meta-item"><strong>📍 发掘地</strong> ${item.site}</span>
        <span class="meta-item"><strong>📅 朝代</strong> ${item.dynasty}</span>
        <span class="meta-item"><strong>🔧 工艺</strong> ${item.craft}</span>
      </div>
      <div class="detail-desc">${item.desc}</div>
      <div class="detail-source">📄 来源：${item.source}</div>
    </div>`;
  }

  document.getElementById('detailInner').innerHTML = `
    <div class="detail-header">
      <span class="detail-title">${pname} · ${cname} — ${catName}</span>
      <span class="detail-badge">${items.length} 条记录</span>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    ${html}
  `;
  document.getElementById('detailPanel').classList.add('open');
}

function showDetailEmpty(msg) {
  document.getElementById('detailInner').innerHTML = `
    <div class="detail-empty">
      <span class="icon">📖</span>
      <span class="text">${msg}</span>
    </div>
  `;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

    let geoJson = null;
    const mapUrls = [
      'https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json',
      'https://geo.datav.aliyun.com/areas_v3/bound/geojson/china.json',
      'https://geojson.cn/api/data/china-geojson/china.json'
    ];
    for (const url of mapUrls) {
      try {
        const resp = await fetch(url, { signal: AbortSignal.timeout(15000) });
        if (resp.ok) {
          geoJson = await resp.json();
          console.log('地图数据加载成功:', url);
          break;
        }
      } catch (e) {
        console.warn('尝试加载地图数据失败:', url, e.message);
      }
    }
    if (!geoJson) throw new Error('所有地图数据源均加载失败');
    echarts.registerMap('china', geoJson);
    mapChart.hideLoading();

    const option = {
      backgroundColor: 'transparent',
      tooltip: {
        trigger: 'item',
        backgroundColor: 'rgba(26,39,54,0.95)',
        borderColor: '#2a3a4a',
        textStyle: { color: '#c8d6e5', fontSize: 13 },
        formatter: function(params) {
          const pname = params.name;
          const pdata = PROVINCE_DATA[pname];
          if (pdata?.hasData) {
            const cityCount = Object.keys(pdata.cities).length;
            let itemCount = 0;
            for (const c of Object.values(pdata.cities)) {
              for (const items of Object.values(c)) itemCount += items.length;
            }
            return `<strong>${pname}</strong><br/>🏙 ${cityCount} 个城市<br/>📄 ${itemCount} 条玉石记录<br/><span style="color:#8395a7;font-size:11px;">点击查看详情</span>`;
          }
          return `<strong>${pname}</strong><br/><span style="color:#8395a7;">数据整理中，敬请期待</span>`;
        }
      },
      series: [{
        name: '中国玉石文化',
        type: 'map',
        map: 'china',
        roam: true,
        zoom: 1.15,
        center: [104.5, 35.5],
        scaleLimit: { min: 0.8, max: 5 },
        markPoint: {
          symbol: 'pin',
          symbolSize: 20,
          itemStyle: { color: '#e8b86d' },
          label: { show: true, color: '#fff', fontSize: 9, position: 'top', distance: 2 },
          animation: true,
          data: [
            { name: '随州', coord: [113.38, 31.72] },
            { name: '荆州', coord: [112.24, 30.33] },
            { name: '武汉', coord: [114.30, 30.60] },
            { name: '十堰', coord: [110.79, 32.65] },
            { name: '荆门', coord: [112.20, 31.04] },
            { name: '钟祥', coord: [112.59, 31.17] },
            { name: '天门', coord: [113.17, 30.66] }
          ]
        },
        label: {
          show: true,
          color: '#5a7a8a',
          fontSize: 9,
          fontFamily: '"Microsoft YaHei", sans-serif'
        },
        emphasis: {
          label: { show: true, color: '#fff', fontSize: 12, fontWeight: 'bold' },
          itemStyle: { areaColor: 'rgba(232,184,109,0.35)', borderColor: '#e8b86d', borderWidth: 2, shadowBlur: 20, shadowColor: 'rgba(232,184,109,0.4)' }
        },
        itemStyle: {
          areaColor: '#1a3040',
          borderColor: '#2d4a5a',
          borderWidth: 1,
          shadowBlur: 0
        },
        select: {
          label: { show: true, color: '#fff', fontSize: 11 },
          itemStyle: { areaColor: 'rgba(232,184,109,0.3)', borderColor: '#e8b86d', borderWidth: 2 }
        },
        data: [
          { name: '湖北省', itemStyle: { areaColor: '#1e4a5e', borderColor: '#4fc3f7', borderWidth: 1.5 }, selected: true },
          { name: '河南省', itemStyle: { areaColor: '#1a3040' } },
          { name: '陕西省', itemStyle: { areaColor: '#1a3040' } },
          { name: '新疆维吾尔自治区', itemStyle: { areaColor: '#1a3040' } },
          { name: '浙江省', itemStyle: { areaColor: '#1a3040' } },
          { name: '江苏省', itemStyle: { areaColor: '#1a3040' } }
        ]
      }]
    };

    mapChart.setOption(option);

    // 点击事件
    mapChart.on('click', function(params) {
      if (params.componentType === 'series') {
        const pname = params.name;
        if (pname && PROVINCE_DATA[pname]) selectProvince(pname);
      }
    });

    // 默认选中湖北
    selectProvince('湖北省');

    // 响应式
    window.addEventListener('resize', () => mapChart.resize());
  } catch (e) {
    mapChart.hideLoading();
    console.error('地图加载失败:', e);
    document.getElementById('china-map').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8395a7;">地图加载失败，请检查网络连接后刷新页面</div>';
  }
}

// ================================================================
// 初始化（等ECharts加载完成）
// ================================================================
function waitForECharts(callback, retries) {
  retries = retries || 20;
  if (typeof echarts !== 'undefined') {
    callback();
  } else if (retries > 0) {
    setTimeout(function() { waitForECharts(callback, retries - 1); }, 500);
  } else {
    document.getElementById('china-map').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#e8b86d;gap:12px;"><span style="font-size:40px;">⚠️</span><span>ECharts 图表库加载失败</span><span style="font-size:12px;color:#8395a7;">请检查网络连接后刷新页面重试</span></div>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  renderSidebar();
  waitForECharts(initMap);
});
</script>
</body>
</html>
