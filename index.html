<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国玉石文化研究 — 荆楚玉文化·绿松石·水晶·玉器</title>
<script src="https://registry.npmmirror.com/echarts/5.5.0/files/dist/echarts.min.js"></script>
<style>
:root{
  --parchment:#f8f0e3;--parchment2:#efe0cc;--wood:#5c3d2e;--wood-dark:#3c2415;
  --ink:#2c1810;--ink-dim:#6b5a4e;--gold:#b8943e;--gold-bright:#d4a84b;
  --jade:#6b9080;--turquoise:#5d8a8a;--crystal:#9b8eb0;--agate:#b8635a;
  --red-seal:#8b1a2a;--border:#d4c5b2;--shadow:0 4px 20px rgba(60,36,21,0.12);
  --card-bg:#faf6ee;--paper:#fefcf7;
}
*{margin:0;padding:0;box-sizing:border-box}
@font-face{font-family:'SerifCN';src:local('SimSun'),local('STSong'),local('Noto Serif CJK SC'),local('Source Han Serif SC')}
body{
  font-family:"Microsoft YaHei","PingFang SC",SerifCN,sans-serif;
  background:var(--parchment);
  color:var(--ink);
  height:100vh;width:100vw;overflow:hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(139,107,74,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(180,150,100,0.05) 0%,transparent 50%);
}

/* 全幅地图 */
#map-container{position:fixed;inset:0;z-index:1}
#china-map{width:100%;height:100%}
#china-map::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(248,240,227,0.3) 100%);
  z-index:99;
}

/* 顶部标题栏 - 卷轴风格 */
.header{
  position:fixed;top:0;left:0;right:0;z-index:10;padding:12px 24px;
  display:flex;align-items:center;gap:16px;
  background:linear-gradient(180deg,
    rgba(248,240,227,0.97) 0%,rgba(248,240,227,0.9) 60%,rgba(248,240,227,0) 100%);
  pointer-events:none;
}
.header>*{pointer-events:auto}
.header .logo-text h1{
  font-size:22px;font-weight:700;color:var(--wood-dark);
  font-family:SerifCN,"KaiTi","STKaiti",serif;
  letter-spacing:2px;
  cursor:pointer;
}
.header .logo-text .sub{
  font-size:10px;color:var(--ink-dim);letter-spacing:4px;margin-top:2px;
}
.header .seal{
  width:42px;height:42px;border:2px solid var(--red-seal);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  color:var(--red-seal);font-size:18px;font-weight:900;
  font-family:SerifCN,serif;transform:rotate(-5deg);
  flex-shrink:0;
}

/* 左侧面板 - 木纹风格 */
.sidebar{
  position:fixed;left:16px;top:100px;z-index:10;
  width:240px;max-height:calc(100vh - 280px);
  background:linear-gradient(180deg,rgba(254,252,247,0.96),rgba(250,246,238,0.96));
  border:1px solid var(--border);border-radius:12px;
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;
  overflow:hidden;
  backdrop-filter:blur(4px);
}
.sidebar-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--wood-dark);
  display:flex;align-items:center;gap:8px;
  font-family:SerifCN,serif;
}
.sidebar-header .dot{width:6px;height:6px;border-radius:50%;background:var(--red-seal)}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 省份条目 */
.prov-item{border-bottom:1px solid rgba(212,197,178,0.4)}
.prov-item:last-child{border-bottom:none}
.prov-row{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  cursor:pointer;transition:all 0.2s;
  font-size:13px;font-weight:500;
}
.prov-row:hover{background:rgba(184,148,62,0.06)}
.prov-row .prov-arrow{
  font-size:8px;color:var(--ink-dim);transition:transform 0.3s;
  width:12px;text-align:center;flex-shrink:0;
}
.prov-item.expanded>.prov-row .prov-arrow{transform:rotate(90deg)}
.prov-row .prov-dot{
  width:5px;height:5px;border-radius:50%;background:var(--ink-dim);
  flex-shrink:0;transition:all 0.3s;
}
.prov-item.active>.prov-row .prov-dot{background:var(--red-seal);box-shadow:0 0 6px rgba(139,26,42,0.3)}
.prov-item.active>.prov-row{color:var(--wood-dark);font-weight:600}
.prov-row .prov-badge{font-size:9px;color:var(--jade);margin-left:auto}

/* 城市列表 */
.city-list{display:none;background:rgba(0,0,0,0.015)}
.prov-item.expanded>.city-list{display:block}
.city-row{
  display:flex;align-items:center;gap:6px;padding:7px 14px 7px 32px;
  cursor:pointer;font-size:12px;color:var(--ink-dim);
  transition:all 0.2s;
}
.city-row:hover{background:rgba(184,148,62,0.08);color:var(--ink)}
.city-row.active{color:var(--wood-dark);font-weight:600;background:rgba(184,148,62,0.1)}
.city-row .city-marker{width:4px;height:4px;border-radius:50%;background:var(--ink-dim);flex-shrink:0}
.city-row.active .city-marker{background:var(--gold-bright);box-shadow:0 0 5px rgba(184,148,62,0.4)}
.city-row .city-count{font-size:9px;color:var(--ink-dim);margin-left:auto;opacity:0.7}

/* 分类标签 */
.cat-tags{display:flex;gap:5px;flex-wrap:wrap;padding:4px 14px 8px 32px}
.cat-tag{
  font-size:9px;padding:2px 8px;border-radius:8px;cursor:pointer;
  border:1px solid;transition:all 0.2s;opacity:0.7;
}
.cat-tag:hover,.cat-tag.active{opacity:1}
.cat-tag.jade{border-color:var(--jade);color:var(--jade)}
.cat-tag.jade.active{background:var(--jade);color:#fff}
.cat-tag.turquoise{border-color:var(--turquoise);color:var(--turquoise)}
.cat-tag.turquoise.active{background:var(--turquoise);color:#fff}
.cat-tag.crystal{border-color:var(--crystal);color:var(--crystal)}
.cat-tag.crystal.active{background:var(--crystal);color:#fff}
.cat-tag.agate{border-color:var(--agate);color:var(--agate)}
.cat-tag.agate.active{background:var(--agate);color:#fff}
.cat-tag.gemstone{border-color:var(--gold);color:var(--gold)}
.cat-tag.gemstone.active{background:var(--gold);color:#fff}

/* 底部卡片横滚区 */
.card-strip{
  position:fixed;bottom:0;left:270px;right:0;z-index:10;
  padding:12px 40px 16px;
  pointer-events:none;
  transition:all 0.4s;
}
.card-strip-inner{
  display:flex;gap:14px;overflow-x:auto;overflow-y:visible;
  padding:8px 4px 20px;scroll-behavior:smooth;
  pointer-events:auto;
}
.card-strip-inner::-webkit-scrollbar{height:3px}
.card-strip-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* 滚动箭头 */
.scroll-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:50%;
  background:var(--paper);border:1px solid var(--border);
  box-shadow:0 2px 12px rgba(60,36,21,0.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;font-size:14px;color:var(--wood);
  transition:all 0.2s;pointer-events:auto;
}
.scroll-arrow:hover{background:var(--gold-bright);color:#fff;border-color:var(--gold-bright)}
.scroll-arrow.left{left:0}
.scroll-arrow.right{right:0}
.scroll-arrow.hidden{opacity:0;pointer-events:none}

/* 迷你卡片 */
.mini-card{
  min-width:200px;max-width:200px;height:170px;
  background:var(--paper);
  border:1px solid var(--border);border-radius:8px;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 2px 12px rgba(60,36,21,0.08);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative;overflow:hidden;
}
.mini-card:hover{transform:translateY(-6px);box-shadow:0 8px 28px rgba(60,36,21,0.18)}
.mini-card .mc-img{
  height:90px;display:flex;align-items:center;justify-content:center;
  font-size:36px;position:relative;
  border-bottom:1px solid var(--border);
}
.mini-card .mc-img.jade-bg{background:linear-gradient(135deg,#e8efe6,#dce8dc)}
.mini-card .mc-img.turquoise-bg{background:linear-gradient(135deg,#e2eeed,#d6e7e6)}
.mini-card .mc-img.crystal-bg{background:linear-gradient(135deg,#ece6f0,#e2dce8)}
.mini-card .mc-img.agate-bg{background:linear-gradient(135deg,#f0e5e5,#e8dada)}
.mini-card .mc-img.gemstone-bg{background:linear-gradient(135deg,#f2ecd8,#ede4cc)}
.mini-card .mc-body{padding:8px 10px}
.mini-card .mc-title{font-size:11px;font-weight:600;color:var(--wood-dark);line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-card .mc-meta{font-size:9px;color:var(--ink-dim)}
.mini-card::after{
  content:'点击展开';position:absolute;bottom:6px;right:8px;
  font-size:8px;color:var(--gold);opacity:0;
  transition:opacity 0.3s;
}
.mini-card:hover::after{opacity:1}

/* 展开详情卡片(纸) */
.detail-overlay{
  position:fixed;inset:0;z-index:50;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.3s;
}
.detail-overlay.open{opacity:1;pointer-events:auto}
.detail-overlay .backdrop{
  position:absolute;inset:0;background:rgba(60,36,21,0.5);
}
.detail-sheet{
  position:relative;width:min(700px,90vw);max-height:80vh;
  background:var(--paper);
  border-radius:12px;box-shadow:0 20px 60px rgba(60,36,21,0.3);
  border:1px solid var(--border);
  overflow-y:auto;z-index:1;
  transform:scale(0.9) translateY(30px);
  transition:transform 0.4s cubic-bezier(0.22,0.61,0.36,1);
}
.detail-overlay.open .detail-sheet{transform:scale(1) translateY(0)}
.detail-sheet::-webkit-scrollbar{width:6px}
.detail-sheet::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.detail-img{
  height:200px;display:flex;align-items:center;justify-content:center;
  font-size:80px;position:relative;
}
.detail-img.jade-bg{background:linear-gradient(180deg,#dce8dc,#e8efe6)}
.detail-img.turquoise-bg{background:linear-gradient(180deg,#d0e2e1,#e2eeed)}
.detail-img.crystal-bg{background:linear-gradient(180deg,#e2dce8,#ece6f0)}
.detail-img.agate-bg{background:linear-gradient(180deg,#e4d4d4,#f0e5e5)}
.detail-img.gemstone-bg{background:linear-gradient(180deg,#e8dbc0,#f2ecd8)}
.detail-img .img-decor{
  position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(0deg,rgba(254,252,247,0.8),transparent);
}

.detail-body{padding:20px 24px}
.detail-title{font-size:18px;font-weight:700;color:var(--wood-dark);margin-bottom:12px;font-family:SerifCN,serif}
.detail-meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.detail-meta-tag{
  font-size:11px;padding:4px 12px;border-radius:4px;
  background:rgba(184,148,62,0.08);color:var(--wood);border:1px solid rgba(184,148,62,0.15);
}
.detail-meta-tag.accent{background:rgba(139,26,42,0.06);color:var(--red-seal);border-color:rgba(139,26,42,0.15)}
.detail-desc{font-size:13px;line-height:2;color:var(--ink);margin-bottom:14px}
.detail-source{font-size:11px;color:var(--ink-dim);font-style:italic;padding-top:12px;border-top:1px solid var(--border)}

.detail-close{
  position:absolute;top:12px;right:12px;z-index:2;
  width:32px;height:32px;border-radius:50%;
  background:var(--paper);border:1px solid var(--border);
  color:var(--ink-dim);font-size:14px;cursor:pointer;
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.detail-close:hover{background:var(--red-seal);color:#fff;border-color:var(--red-seal)}

/* 响应式 */
@media(max-width:768px){
  .sidebar{left:4px;width:180px;max-height:50vh}
  .card-strip{left:4px}
  .mini-card{min-width:150px;max-width:150px;height:140px}
}

.search-box{position:fixed;top:16px;right:24px;z-index:20;display:flex;align-items:center;gap:8px;background:rgba(254,252,247,0.94);border:1px solid var(--border);border-radius:24px;padding:6px 6px 6px 16px;box-shadow:var(--shadow)}
.search-box:focus-within{border-color:var(--gold)}
.search-box input{border:none;background:transparent;outline:none;font-size:12px;width:180px;color:var(--ink);font-family:"Microsoft YaHei",sans-serif}
.search-box input::placeholder{color:var(--ink-dim);opacity:0.6}
.search-btn{width:30px;height:30px;border-radius:50%;background:var(--gold);border:none;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.search-btn:hover{background:var(--wood)}
.search-results{position:fixed;top:64px;right:24px;z-index:20;width:320px;max-height:360px;overflow-y:auto;background:rgba(254,252,247,0.98);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(60,36,21,0.15);display:none}
.search-results.open{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(212,197,178,0.3);font-size:12px;color:var(--ink);transition:background 0.2s}
.sr-item:hover{background:rgba(184,148,62,0.06)}
.sr-title{font-weight:600;color:var(--wood-dark)}
.sr-meta{font-size:10px;color:var(--ink-dim);margin-top:2px}
.timeline-bar{position:fixed;top:0;left:0;right:0;z-index:9;background:linear-gradient(180deg,rgba(248,240,227,0.98) 0%,rgba(248,240,227,0.92) 80%,rgba(248,240,227,0) 100%);padding:80px 24px 16px;pointer-events:none;display:flex;align-items:flex-end;gap:4px;justify-content:center;flex-wrap:wrap}
.timeline-bar>*{pointer-events:auto}
.timeline-item{padding:6px 16px;cursor:pointer;font-size:11px;border-radius:20px;transition:all 0.2s;border:1px solid transparent;white-space:nowrap;color:var(--ink-dim);font-family:SerifCN,serif}
.timeline-item:hover{border-color:var(--gold);color:var(--wood-dark)}
.timeline-item.active{background:var(--wood);color:#fff;border-color:var(--wood);box-shadow:0 2px 8px rgba(60,36,21,0.2)}
.sidebar{top:140px;max-height:calc(100vh - 300px)}
</style>
</head>
<body>

<div class="search-box"><input type="text" id="searchInput" placeholder="🔍 搜索玉石、地点、朝代..." oninput="doSearch()" onfocus="doSearch()"><button class="search-btn">⌕</button></div>
<div class="search-results" id="searchResults"></div>
<div class="timeline-bar" id="timelineBar"></div>
<div id="map-container"><div id="china-map"></div></div>

<!-- 顶部 -->
<div class="header">
  <div class="seal">玉</div>
  <div class="logo-text">
    <h1 onclick="goHome()">中国玉石文化研究</h1>
    <div class="sub">荆楚玉文化 · 绿松石 · 水晶 · 玉器 · 玛瑙</div>
  </div>
</div>

<!-- 左侧面板 -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="dot"></span>
    <span id="sidebarTitle">🌐 全国版图</span>
  </div>
  <div class="sidebar-scroll" id="sidebarContent"></div>
</div>

<!-- 底部卡片横滚区 -->
<div class="card-strip" id="cardStrip" style="display:none">
  <div class="scroll-arrow left hidden" id="scrollLeft" onclick="scrollCards(-1)">◀</div>
  <div class="scroll-arrow right" id="scrollRight" onclick="scrollCards(1)">▶</div>
  <div class="card-strip-inner" id="cardStripInner"></div>
</div>

<!-- 详情展开遮罩 -->
<div class="detail-overlay" id="detailOverlay">
  <div class="backdrop" onclick="closeDetail()"></div>
  <div class="detail-sheet" id="detailSheet"></div>
</div>

const CAT_IMG={jade:'🏺',turquoise:'🪶',crystal:'🔮',agate:'🧿',gemstone:'👑'};

// ================================================================
// 状态
// ================================================================
let mapChart=null,curProv=null,curCity=null,curCat=null;

// ================================================================
// 地图初始化
// ================================================================
async function initMap(){
  const dom=document.getElementById('china-map');
  mapChart=echarts.init(dom);
  echarts.registerMap('china',EMBEDDED_GEOJSON);

  mapChart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'item',backgroundColor:'rgba(254,252,247,0.96)',borderColor:'#b8943e',
      textStyle:{color:'#2c1810',fontSize:12},
      formatter:function(p){
        const pd=PROVINCE_DATA[p.name];if(!pd)return p.name;
        if(pd.hasData){let t=0;Object.values(pd.cities).forEach(c=>Object.values(c).forEach(v=>t+=v.length));return '<b>'+p.name+'</b><br/>'+Object.keys(pd.cities).length+'个城市 · '+t+'条记录';}
        return '<b>'+p.name+'</b><br/><span style="color:#6b5a4e">数据整理中</span>';
      }
    },
    geo:{map:'china',roam:true,zoom:1.15,center:[104.5,35.5],
      scaleLimit:{min:0.8,max:20},
      label:{show:true,color:'#8b7355',fontSize:9,fontFamily:'"Microsoft YaHei",sans-serif'},
      emphasis:{label:{show:true,color:'#3c2415',fontSize:12,fontWeight:'bold'},
        itemStyle:{areaColor:'rgba(184,148,62,0.35)',borderColor:'#b8943e',borderWidth:2,shadowBlur:15,shadowColor:'rgba(184,148,62,0.3)'}},
      itemStyle:{areaColor:'#efe0cc',borderColor:'#c4a97a',borderWidth:0.8},
      regions:[]
    },
    series:[{
      type:'effectScatter',coordinateSystem:'geo',geoIndex:0,zlevel:2,
      rippleEffect:{brushType:'stroke',scale:3.5,period:4.5},
      symbol:'circle',symbolSize:function(v){return Math.max(5,v[2]*2.8)},
      showEffectOn:'render',
      itemStyle:{color:'#b8635a',shadowBlur:12,shadowColor:'rgba(184,99,90,0.5)'},
      label:{show:true,formatter:'{b}',position:'right',color:'#3c2415',fontSize:10,distance:8,fontWeight:'bold'},
      data:[]
    }]
  });

  mapChart.on('click',function(p){if(p.componentType==='geo'){var n=p.name;if(PROVINCE_DATA[n])selectProvince(n);}});
  window.addEventListener('resize',function(){mapChart.resize();});
  buildAllItems();renderTimeline();setTimeout(function(){selectProvince('湖北省');},600);
}

// ================================================================
// 地图操作
// ================================================================
function animGeo(center,zoom,regions){
  if(!mapChart)return;
  mapChart.setOption({geo:{center:center,zoom:zoom,regions:regions||[]}},{animation:true,animationDurationUpdate:800,animationEasingUpdate:'cubicInOut'});
}
function zoomProv(pn){var c=PROV_COORDS[pn]||[112,31];animGeo(c,3.5,[{name:pn,itemStyle:{areaColor:'rgba(184,148,62,0.25)',borderColor:'#b8943e',borderWidth:2},label:{show:true,color:'#3c2415',fontSize:11,fontWeight:'bold'}}]);}
function zoomCity(cn){var c=CITY_COORDS[cn];if(!c)return;animGeo(c,9,curProv?[{name:curProv,itemStyle:{areaColor:'rgba(184,148,62,0.12)',borderColor:'#b8943e',borderWidth:1}}]:[]);}
function zoomChina(){animGeo([104.5,35.5],1.15,[]);curProv=null;curCity=null;curCat=null;curDynasty=null;renderSidebar();renderCards();document.getElementById('sidebarTitle').textContent='🌐 全国版图';}

// ================================================================
// 更新星星标记
// ================================================================
function updateMarkers(){
  if(!mapChart)return;
  var m=[];
  if(curProv&&PROVINCE_DATA[curProv]&&PROVINCE_DATA[curProv].hasData){
    var cities=PROVINCE_DATA[curProv].cities;
    Object.keys(cities).forEach(function(cn){
      var coord=CITY_COORDS[cn];if(!coord)return;
      var items=Object.values(cities[cn]).flat();
      m.push({name:cn,value:[coord[0],coord[1],Math.min(items.length,8)]});
    });
  }
  mapChart.setOption({series:[{data:m}]});
}

// ================================================================
// 侧边栏渲染
// ================================================================
function renderSidebar(){
  var h='';ORDERED.forEach(function(pn){
    var pd=PROVINCE_DATA[pn];if(!pd)return;
    var active=curProv===pn;var expanded=active&&pd.hasData;
    h+='<div class="prov-item'+(active?' active':'')+(expanded?' expanded':'')+'">';
    h+='<div class="prov-row" onclick="toggleProv(\''+pn+'\')">';
    h+='<span class="prov-arrow">▶</span><span class="prov-dot"></span>';
    h+='<span>'+pn+'</span>';
    if(pd.hasData)h+='<span class="prov-badge">'+Object.keys(pd.cities).length+'市</span>';
    h+='</div>';
    if(pd.hasData){
      h+='<div class="city-list">';
      Object.keys(pd.cities).forEach(function(cn){
        var cActive=curCity===cn;var cats=pd.cities[cn];
        var total=0;Object.values(cats).forEach(function(v){total+=v.length;});
        h+='<div class="city-row'+(cActive?' active':'')+'" onclick="event.stopPropagation();selectCity(\''+pn+'\',\''+cn+'\')">';
        h+='<span class="city-marker"></span><span>'+cn+'</span>';
        if(total)h+='<span class="city-count">'+total+'条</span>';
        h+='</div>';
        // 分类标签
        if(cActive){
          h+='<div class="cat-tags">';
          Object.keys(cats).forEach(function(k){
            if(!cats[k].length)return;
            var cls=CAT_CLASS[k]||'jade';var cSel=curCat===k;
            h+='<span class="cat-tag '+cls+(cSel?' active':'')+'" onclick="event.stopPropagation();selectCat(\''+pn+'\',\''+cn+'\',\''+k+'\')">'+CAT_NAMES[k]+'</span>';
          });
          h+='</div>';
        }
      });
      h+='</div>';
    }
    h+='</div>';
  });
  document.getElementById('sidebarContent').innerHTML=h;
}

// ================================================================
// 选择逻辑
// ================================================================
function toggleProv(pn){
  if(curProv===pn&&PROVINCE_DATA[pn]&&PROVINCE_DATA[pn].hasData){
    // collapse
    curProv=null;curCity=null;curCat=null;zoomChina();
  }else{
    selectProvince(pn);
  }
}
function selectProvince(pn){
  curProv=pn;curCity=null;curCat=null;
  document.getElementById('sidebarTitle').textContent='📍 '+pn;
  zoomProv(pn);updateMarkers();renderSidebar();
  if(!PROVINCE_DATA[pn]||!PROVINCE_DATA[pn].hasData){renderCards();return;}
  // 显示所有城市卡片
  showAllCityCards(pn);
}
function selectCity(pn,cn){
  curProv=pn;curCity=cn;curCat=null;
  document.getElementById('sidebarTitle').textContent='📍 '+pn+' · '+cn;
  zoomCity(cn);updateMarkers();renderSidebar();
  showCityCards(pn,cn);
}
function selectCat(pn,cn,cat){
  curProv=pn;curCity=cn;curCat=cat;
  renderSidebar();
  showCityCards(pn,cn,cat);
}
function goHome(){zoomChina();}

// ================================================================
// 卡片渲染
// ================================================================
function showAllCityCards(pn){
  var pd=PROVINCE_DATA[pn];if(!pd||!pd.hasData){renderCards();return;}
  var allItems=[];
  Object.keys(pd.cities).forEach(function(cn){
    var cats=pd.cities[cn];
    Object.keys(cats).forEach(function(k){
      cats[k].forEach(function(item){allItems.push({city:cn,cat:k,item:item});});
    });
  });
  renderCards(allItems);
}
function showCityCards(pn,cn,cat){
  var cats=PROVINCE_DATA[pn]&&PROVINCE_DATA[pn].cities?PROVINCE_DATA[pn].cities[cn]:null;
  if(!cats){renderCards();return;}
  var items=[];
  if(cat){if(cats[cat])cats[cat].forEach(function(item){items.push({city:cn,cat:cat,item:item});});}
  else{Object.keys(cats).forEach(function(k){cats[k].forEach(function(item){items.push({city:cn,cat:k,item:item});});});}
  items=filterByDynasty(items);items=filterByDynasty(items);renderCards(items);
}
var CARD_DATA=[];
function renderCards(items){
  var strip=document.getElementById('cardStrip');
  var inner=document.getElementById('cardStripInner');
  if(!items||!items.length){strip.style.display='none';inner.innerHTML='';CARD_DATA=[];return;}
  strip.style.display='block';
  CARD_DATA=items;
  inner.innerHTML=items.map(function(d,i){
    var ic=CAT_ICON[d.cat]||'💎';var cls=CAT_CLASS[d.cat]||'jade';var it=d.item;
    return '<div class="mini-card" data-idx="'+i+'"><div class="mc-img '+cls+'-bg">'+ic+'</div><div class="mc-body"><div class="mc-title">'+it.title+'</div><div class="mc-meta">📍'+it.site+' · '+it.dynasty+'</div></div></div>';
  }).join('');
  // 绑定点击事件
  setTimeout(function(){
    inner.querySelectorAll('.mini-card').forEach(function(card){
      card.addEventListener('click',function(){openDetail(parseInt(this.dataset.idx));});
    });
  },50);
  updateScrollArrows();
  // listen for scroll
  inner.onscroll=updateScrollArrows;
  setTimeout(updateScrollArrows,300);
}
function updateScrollArrows(){
  var inner=document.getElementById('cardStripInner');
  var sl=document.getElementById('scrollLeft'),sr=document.getElementById('scrollRight');
  if(!inner){return;}
  var maxScroll=inner.scrollWidth-inner.clientWidth;
  if(inner.scrollLeft<=2)sl.classList.add('hidden');else sl.classList.remove('hidden');
  if(inner.scrollLeft>=maxScroll-2)sr.classList.add('hidden');else sr.classList.remove('hidden');
}
function scrollCards(dir){
  var inner=document.getElementById('cardStripInner');
  inner.scrollBy({left:dir*240,behavior:'smooth'});
  setTimeout(updateScrollArrows,400);
}

// ================================================================
// 详情展开
// ================================================================
function openDetail(idx){
  var d=CARD_DATA[idx];if(!d)return;
  var cls=d.cat,it=d.item,ic=CAT_IMG[cls]||'🏺',catClass=CAT_CLASS[cls]||'jade';
  var overlay=document.getElementById('detailOverlay');
  var sheet=document.getElementById('detailSheet');
  sheet.innerHTML='<button class="detail-close" onclick="closeDetail()">✕</button>'+
    '<div class="detail-img '+catClass+'-bg">'+ic+'<div class="img-decor"></div></div>'+
    '<div class="detail-body"><div class="detail-title">'+it.title+'</div>'+
    '<div class="detail-meta-row"><span class="detail-meta-tag accent">📍 '+it.site+'</span><span class="detail-meta-tag">📅 '+it.dynasty+'</span><span class="detail-meta-tag">🔧 '+it.craft+'</span></div>'+
    '<div class="detail-desc">'+it.desc+'</div><div class="detail-source">📄 来源：'+it.source+'</div></div>';
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetail(){
  var overlay=document.getElementById('detailOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow='';
}

// ================================================================
// 初始化
// ================================================================
var allItemsFlat=[],curDynasty=null;
var DYNASTIES=["新石器时代","夏","商","西周","春秋","战国早期","战国中晚期","战国","汉代","明代","清代","现代"];

function buildAllItems(){allItemsFlat=[];for(var pn in PROVINCE_DATA){var pd=PROVINCE_DATA[pn];if(!pd||!pd.hasData)continue;for(var cn in pd.cities){var cats=pd.cities[cn];for(var k in cats){var items=cats[k];for(var i=0;i<items.length;i++)allItemsFlat.push({province:pn,city:cn,cat:k,item:items[i]});}}}}

function renderTimeline(){var h='<span class="timeline-item'+(curDynasty===null?" active":"")+'" onclick="filterDynasty(null)" style="font-weight:600">📜 全部</span>';for(var i=0;i<DYNASTIES.length;i++){var d=DYNASTIES[i];h+='<span class="timeline-item'+(curDynasty===d?" active":"")+'" onclick="filterDynasty(\''+d+'\')">'+d+"</span>";}document.getElementById("timelineBar").innerHTML=h;}

function filterDynasty(d){curDynasty=d;renderTimeline();if(curProv){if(curCity)selectCity(curProv,curCity);else selectProvince(curProv);}}

function filterByDynasty(items){if(!curDynasty)return items;return items.filter(function(d){return d.item.dynasty&&d.item.dynasty.indexOf(curDynasty)>=0;});}

function doSearch(){var q=document.getElementById("searchInput").value.trim().toLowerCase();var r=document.getElementById("searchResults");if(!q){r.classList.remove("open");return;}var f=allItemsFlat.filter(function(d){return d.item.title.toLowerCase().indexOf(q)>=0||d.item.site.toLowerCase().indexOf(q)>=0||d.item.dynasty.toLowerCase().indexOf(q)>=0||d.city.toLowerCase().indexOf(q)>=0;});if(!f.length){r.classList.add("open");r.innerHTML='<div class="sr-item" style="color:var(--ink-dim)">未找到匹配结果</div>';return;}r.classList.add("open");r.innerHTML="";for(var i=0;i<Math.min(f.length,15);i++){(function(d){var div=document.createElement("div");div.className="sr-item";div.innerHTML='<div class="sr-title">'+d.item.title+'</div><div class="sr-meta">📍'+d.province+"·"+d.city+" | 📅"+d.item.dynasty+"</div>";div.onclick=function(){jumpToItem(d.province,d.city);};r.appendChild(div);})(f[i]);}}

function jumpToItem(pn,cn){curProv=pn;curCity=cn;curDynasty=null;document.getElementById("searchInput").value="";document.getElementById("searchResults").classList.remove("open");zoomCity(cn);selectCity(pn,cn);renderTimeline();renderSidebar();updateMarkers();setTimeout(function(){var cards=document.querySelectorAll(".mini-card");if(cards.length>0)cards[0].click();},800);}

function waitForECharts(cb,r){r=r||30;if(typeof echarts!=='undefined')cb();else if(r>0)setTimeout(function(){waitForECharts(cb,r-1);},400);else document.getElementById('china-map').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5c3d2e;flex-direction:column;gap:12px;font-family:serif"><span style="font-size:60px">⚠️</span><span>地图库加载失败</span><span style="font-size:12px;color:#6b5a4e">请检查网络后刷新页面</span></div>';}

document.addEventListener('DOMContentLoaded',function(){document.addEventListener('click',function(e){if(!e.target.closest('.search-box')&&!e.target.closest('.search-results'))document.getElementById('searchResults').classList.remove('open');});
  renderSidebar();
  waitForECharts(initMap);
});
</script>
</body>
</html>
